name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    env:
      # Opt-in to Node.js 24 early to silence deprecation warnings from
      # actions/checkout@v4 and microsoft/setup-msbuild@v2 until they publish
      # updated runners.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install static analysis tools
      run: |
        choco install llvm cppcheck -y --no-progress
        "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "C:\Program Files\Cppcheck" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Check formatting
      run: |
        $files = git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx'
        clang-format --dry-run --Werror $files

    - name: Run CppCheck
      run: |
        $files = git ls-files 'AudioPlaybackConnector2/src/*.cpp' 'AudioPlaybackConnector2/ui/*.cpp'
        cppcheck `
          --enable=warning,performance,portability `
          --std=c++20 `
          --language=c++ `
          --platform=win64 `
          --inline-suppr `
          -IAudioPlaybackConnector2/include `
          -IAudioPlaybackConnector2/res `
          -IAudioPlaybackConnector2/ui `
          -IAudioPlaybackConnector2/ui/App `
          -IAudioPlaybackConnector2/ui/MainWindow `
          -IAudioPlaybackConnector2/ui/DevicePickerView `
          -IAudioPlaybackConnector2/ui/SettingsWindow `
          --error-exitcode=1 `
          --template=gcc `
          $files

    - name: Restore NuGet packages
      run: msbuild AudioPlaybackConnector2.slnx -t:restore -p:RestorePackagesConfig=true

    # CI builds the .exe only; MSIX signing is intentionally disabled here because
    # this workflow does not produce release artifacts. Release signing happens
    # in release.yml using the repository's self-signed certificate.
    - name: Build (Release, x64)
      run: >
        msbuild AudioPlaybackConnector2.slnx
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxPackageSigningEnabled=false
        /t:Rebuild

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: AudioPlaybackConnector2-x64-Release
        path: x64/Release/AudioPlaybackConnector2/AudioPlaybackConnector2.exe
        if-no-files-found: error
