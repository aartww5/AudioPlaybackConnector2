name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.5.0.
        required: true
        type: string

env:
  APPINSTALLER_URL: https://n0ahtm.github.io/AudioPlaybackConnector2/AudioPlaybackConnector2.appinstaller

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
      pages: write
    outputs:
      semver: ${{ steps.version.outputs.SEMVER }}
      tag: ${{ steps.version.outputs.TAG }}
      version: ${{ steps.version.outputs.VERSION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          "${{ inputs.tag }}"
        } else {
          "${{ github.ref_name }}"
        }
        if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
          throw "Release tag must look like v0.5.0."
        }

        $semver = $tag.TrimStart('v')
        $quad = "$semver.0"
        "TAG=$tag" >> $env:GITHUB_OUTPUT
        "SEMVER=$semver" >> $env:GITHUB_OUTPUT
        "VERSION=$quad" >> $env:GITHUB_OUTPUT

    - name: Patch version into package metadata
      shell: pwsh
      run: ./scripts/release/update-package-version.ps1 -Version '${{ steps.version.outputs.VERSION }}'

    - name: Decode signing certificate
      id: cert
      shell: pwsh
      run: |
        $certPath = "$env:TEMP\AudioPlaybackConnector2.pfx"
        $bytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE_PFX }}")
        [IO.File]::WriteAllBytes($certPath, $bytes)
        "CERT_PATH=$certPath" >> $env:GITHUB_OUTPUT

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: msbuild AudioPlaybackConnector2.slnx -t:restore -p:RestorePackagesConfig=true

    - name: Build signed MSIX (Release, x64)
      run: >
        msbuild AudioPlaybackConnector2.slnx
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxPackageSigningEnabled=true
        /p:PackageCertificateKeyFile=${{ steps.cert.outputs.CERT_PATH }}
        /p:PackageCertificatePassword=${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        /p:UapAppxPackageBuildMode=SideloadOnly
        /p:AppxBundle=Never
        /t:Rebuild

    - name: Locate MSIX
      id: msix
      shell: pwsh
      run: ./scripts/release/locate-msix.ps1 -Version '${{ steps.version.outputs.VERSION }}' -Configuration Release -Architecture x64

    - name: Collect dependencies
      id: deps
      shell: pwsh
      run: |
        $depsDir = '${{ steps.msix.outputs.DEPS_DIR }}'
        if (-not $depsDir -or -not (Test-Path $depsDir)) {
          Write-Host "No dependencies directory found."
          exit 0
        }
        $staging = Join-Path $env:RUNNER_TEMP 'dependencies'
        New-Item -ItemType Directory -Path $staging -Force | Out-Null
        $files = Get-ChildItem -Path $depsDir -Recurse -Include @("*.appx", "*.msix")
        foreach ($f in $files) {
          Copy-Item -LiteralPath $f.FullName -Destination $staging -Force
        }
        "DIR=$staging" >> $env:GITHUB_OUTPUT
        Get-ChildItem -Path $staging | ForEach-Object { Write-Host "Dependency: $($_.Name)" }

    - name: Extract changelog
      id: changelog
      shell: pwsh
      run: ./scripts/release/extract-changelog.ps1 -Version '${{ steps.version.outputs.TAG }}'

    - name: Generate App Installer feed
      id: appinstaller
      shell: pwsh
      run: |
        $msixUrl = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.TAG }}/${{ steps.msix.outputs.NAME }}"
        $depBaseUrl = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.TAG }}"
        $outputPath = Join-Path $env:RUNNER_TEMP 'AudioPlaybackConnector2.appinstaller'
        $depsDir = '${{ steps.deps.outputs.DIR }}'
        $params = @{
          MsixUrl = $msixUrl
          AppInstallerUrl = $env:APPINSTALLER_URL
          OutputPath = $outputPath
          ProcessorArchitecture = 'x64'
        }
        if ($depsDir -and (Test-Path $depsDir)) {
          $params['DependenciesDirectory'] = $depsDir
          $params['DependencyBaseUrl'] = $depBaseUrl
        }
        ./scripts/release/generate-appinstaller.ps1 @params
        "PATH=$outputPath" >> $env:GITHUB_OUTPUT

    - name: Build release body
      id: body
      shell: pwsh
      run: |
        $changelog = @'
        ${{ steps.changelog.outputs.BODY }}
        '@
        $footer = @'

        ---

        **Installation:** Download the `.cer` once and install through the `.appinstaller` file.

        ```powershell
        Import-Certificate -FilePath ".\AudioPlaybackConnector2.cer" -CertStoreLocation "Cert:\LocalMachine\Root"
        Start-Process "ms-appinstaller:?source=${{ env.APPINSTALLER_URL }}"
        ```

        If Windows does not open App Installer from the protocol link, download and open the `.appinstaller` asset directly. Direct MSIX sideloading remains available, but installing through the `.appinstaller` file enables Windows App Installer update checks.

        > Releases are signed with a self-signed certificate. A free open-source code-signing certificate has been requested but approval may take some time.
        '@
        $fullBody = ($changelog.Trim() + "`n" + $footer).Trim()
        $bodyPath = Join-Path $env:RUNNER_TEMP 'release-body.md'
        [System.IO.File]::WriteAllText($bodyPath, $fullBody)
        "PATH=$bodyPath" >> $env:GITHUB_OUTPUT

    - name: Create draft GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.TAG }}
        name: v${{ steps.version.outputs.SEMVER }}
        draft: true
        overwrite_files: true
        body_path: ${{ steps.body.outputs.PATH }}
        files: |
          ${{ steps.msix.outputs.PATH }}
          ${{ steps.appinstaller.outputs.PATH }}
          certs/AudioPlaybackConnector2.cer
        fail_on_unmatched_files: true

    - name: Upload dependency assets
      if: steps.deps.outputs.DIR != ''
      shell: pwsh
      run: |
        $deps = Get-ChildItem -Path '${{ steps.deps.outputs.DIR }}' -File
        foreach ($dep in $deps) {
          gh release upload "${{ steps.version.outputs.TAG }}" $dep.FullName --repo "${{ github.repository }}" --clobber
        }
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Stage App Installer feed for GitHub Pages
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path pages -Force | Out-Null
        Copy-Item -LiteralPath '${{ steps.appinstaller.outputs.PATH }}' -Destination 'pages/AudioPlaybackConnector2.appinstaller' -Force

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: pages

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-release
      - deploy-pages
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verify published App Installer feed
      shell: pwsh
      run: >
        ./scripts/release/verify-appinstaller-feed.ps1
        -AppInstallerUrl '${{ env.APPINSTALLER_URL }}'
        -ExpectedPackageVersion '${{ needs.build-release.outputs.version }}'

    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release edit "${{ needs.build-release.outputs.tag }}" --repo "${{ github.repository }}" --draft=false
