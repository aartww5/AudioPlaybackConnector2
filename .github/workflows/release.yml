name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      APPINSTALLER_URL: https://n0ahtm.github.io/AudioPlaybackConnector2/AudioPlaybackConnector2.appinstaller

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $semver = "${{ github.ref_name }}".TrimStart('v')
        $quad   = "$semver.0"
        "SEMVER=$semver" >> $env:GITHUB_OUTPUT
        "VERSION=$quad"  >> $env:GITHUB_OUTPUT

    - name: Patch version into RC and appxmanifest
      shell: pwsh
      run: |
        $v  = "${{ steps.version.outputs.VERSION }}"
        $rc = $v -replace '\.', ','

        $rcPath = "AudioPlaybackConnector2/res/AudioPlaybackConnector2.rc"
        $content = Get-Content $rcPath -Raw
        $content = $content -replace 'FILEVERSION \d+,\d+,\d+,\d+',   "FILEVERSION $rc"
        $content = $content -replace 'PRODUCTVERSION \d+,\d+,\d+,\d+', "PRODUCTVERSION $rc"
        $content = $content -replace '"FileVersion",\s*"[\d.]+"',   "`"FileVersion`", `"$v`""
        $content = $content -replace '"ProductVersion",\s*"[\d.]+"', "`"ProductVersion`", `"$v`""
        Set-Content $rcPath $content -Encoding utf8

        $manifestPath = 'AudioPlaybackConnector2 (Package)/Package.appxmanifest'
        [xml]$manifest = Get-Content $manifestPath -Raw
        $manifest.Package.Identity.Version = $v
        $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
        $writer = New-Object System.IO.StreamWriter($manifestPath, $false, $utf8NoBom)
        $manifest.Save($writer)
        $writer.Close()

    - name: Decode signing certificate
      id: cert
      shell: pwsh
      run: |
        $certPath = "$env:TEMP\AudioPlaybackConnector2.pfx"
        $bytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE_PFX }}")
        [IO.File]::WriteAllBytes($certPath, $bytes)
        "CERT_PATH=$certPath" >> $env:GITHUB_OUTPUT

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: msbuild AudioPlaybackConnector2.slnx -t:restore -p:RestorePackagesConfig=true

    - name: Build signed MSIX (Release, x64)
      run: >
        msbuild AudioPlaybackConnector2.slnx
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxPackageSigningEnabled=true
        /p:PackageCertificateKeyFile=${{ steps.cert.outputs.CERT_PATH }}
        /p:PackageCertificatePassword=${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        /p:UapAppxPackageBuildMode=SideloadOnly
        /p:AppxBundle=Never
        /t:Rebuild

    - name: Locate MSIX
      id: msix
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'AudioPlaybackConnector2 (Package)/AppPackages' `
                              -Recurse -Filter '*.msix' |
                Where-Object { $_.Name -notmatch 'Dependencies' } |
                Select-Object -First 1
        if (-not $file) { throw "MSIX not found" }
        $assetName = "AudioPlaybackConnector2_${{ steps.version.outputs.VERSION }}_x64.msix"
        $assetPath = Join-Path $env:RUNNER_TEMP $assetName
        Copy-Item -LiteralPath $file.FullName -Destination $assetPath -Force
        "PATH=$assetPath" >> $env:GITHUB_OUTPUT
        "NAME=$assetName" >> $env:GITHUB_OUTPUT

    - name: Generate App Installer feed
      id: appinstaller
      shell: pwsh
      run: |
        [xml]$manifest = Get-Content 'AudioPlaybackConnector2 (Package)/Package.appxmanifest' -Raw
        $identity = $manifest.Package.Identity
        [xml]$project = Get-Content 'AudioPlaybackConnector2 (Package)/AudioPlaybackConnector2 (Package).wapproj' -Raw
        $namespaceManager = New-Object System.Xml.XmlNamespaceManager($project.NameTable)
        $namespaceManager.AddNamespace('msb', 'http://schemas.microsoft.com/developer/msbuild/2003')
        $hoursNode = $project.SelectSingleNode('//msb:HoursBetweenUpdateChecks', $namespaceManager)
        if (-not $hoursNode) {
          $hoursNode = $project.SelectSingleNode('//*[local-name()="HoursBetweenUpdateChecks"]')
        }
        $hoursBetweenUpdateChecks = if ($hoursNode -and -not [string]::IsNullOrWhiteSpace($hoursNode.InnerText)) {
          $hoursNode.InnerText.Trim()
        } else {
          '24'
        }
        $msixUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.msix.outputs.NAME }}"
        $path = Join-Path $env:RUNNER_TEMP 'AudioPlaybackConnector2.appinstaller'

        $content = @"
        <?xml version="1.0" encoding="utf-8"?>
        <AppInstaller
            xmlns="http://schemas.microsoft.com/appx/appinstaller/2017/2"
            xmlns:s4="http://schemas.microsoft.com/appx/appinstaller/2018"
            Version="$($identity.Version)"
            Uri="$env:APPINSTALLER_URL">
          <MainPackage
              Name="$($identity.Name)"
              Publisher="$($identity.Publisher)"
              Version="$($identity.Version)"
              ProcessorArchitecture="x64"
              Uri="$msixUrl" />
          <UpdateSettings>
            <OnLaunch HoursBetweenUpdateChecks="$hoursBetweenUpdateChecks" />
            <s4:AutomaticBackgroundTask />
          </UpdateSettings>
        </AppInstaller>
        "@

        $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
        [System.IO.File]::WriteAllText($path, $content.TrimStart(), $utf8NoBom)
        "PATH=$path" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ steps.version.outputs.SEMVER }}
        draft: true
        body: |
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.

          **Runtime dependencies:** Install these once before launching the MSIX package:

          1. [WinAppRuntime.Singleton](https://apps.microsoft.com/detail/9p5z076k079h)
          2. [Windows App SDK 2.0 runtime](https://learn.microsoft.com/en-us/windows/apps/windows-app-sdk/downloads#windows-app-sdk-20)

          If launch fails with `DEP0840` and mentions `MicrosoftCorporationII.WinAppRuntime.Main.2` or `MicrosoftCorporationII.WinAppRuntime.Singleton`, reinstall the runtime dependencies above.

          **Installation:** Download the `.cer` once and install through the `.appinstaller` file.

          1. Install the runtime dependencies listed above.
          2. Install the certificate once:
             ```powershell
             Import-Certificate -FilePath ".\AudioPlaybackConnector2.cer" -CertStoreLocation "Cert:\LocalMachine\Root"
             ```
          3. Install or update through App Installer:
             ```powershell
             Start-Process "ms-appinstaller:?source=${{ env.APPINSTALLER_URL }}"
             ```

          If Windows does not open App Installer from the protocol link, download and open the `.appinstaller` asset directly. Direct MSIX sideloading remains available, but installing through the `.appinstaller` file enables Windows App Installer update checks.

          > Releases are signed with a self-signed certificate. A free open-source code-signing certificate has been requested but approval may take some time.
        files: |
          ${{ steps.msix.outputs.PATH }}
          ${{ steps.appinstaller.outputs.PATH }}
          certs/AudioPlaybackConnector2.cer
        fail_on_unmatched_files: true

    - name: Publish App Installer feed to GitHub Pages
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path pages -Force | Out-Null
        Copy-Item -LiteralPath '${{ steps.appinstaller.outputs.PATH }}' -Destination 'pages/AudioPlaybackConnector2.appinstaller' -Force

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: pages

    - name: Deploy GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Verify published App Installer feed
      shell: pwsh
      run: |
        $expectedVersion = "${{ steps.version.outputs.VERSION }}"
        $verified = $false

        for ($attempt = 1; $attempt -le 6; $attempt++) {
          try {
            $response = Invoke-WebRequest -Uri $env:APPINSTALLER_URL -UseBasicParsing -TimeoutSec 30 -ErrorAction Stop
            [xml]$feed = $response.Content
            $actualVersion = $feed.DocumentElement.GetAttribute('Version')
            if ($actualVersion -eq $expectedVersion) {
              $verified = $true
              break
            }

            Write-Warning "App Installer feed version is '$actualVersion', expected '$expectedVersion'."
          } catch {
            Write-Warning "App Installer feed check failed on attempt ${attempt}: $($_.Exception.Message)"
          }

          Start-Sleep -Seconds 10
        }

        if (-not $verified) {
          throw "Published App Installer feed did not match version $expectedVersion."
        }

    - name: Publish GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
