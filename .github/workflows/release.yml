name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $semver = "${{ github.ref_name }}".TrimStart('v')
        $quad   = "$semver.0"
        "SEMVER=$semver" >> $env:GITHUB_OUTPUT
        "VERSION=$quad"  >> $env:GITHUB_OUTPUT

    - name: Patch version into RC and appxmanifest
      shell: pwsh
      run: |
        $v  = "${{ steps.version.outputs.VERSION }}"
        $rc = $v -replace '\.', ','

        $rcPath = "AudioPlaybackConnector2/res/AudioPlaybackConnector2.rc"
        $content = Get-Content $rcPath -Raw
        $content = $content -replace 'FILEVERSION \d+,\d+,\d+,\d+',   "FILEVERSION $rc"
        $content = $content -replace 'PRODUCTVERSION \d+,\d+,\d+,\d+', "PRODUCTVERSION $rc"
        $content = $content -replace '"FileVersion",\s*"[\d.]+"',   "`"FileVersion`", `"$v`""
        $content = $content -replace '"ProductVersion",\s*"[\d.]+"', "`"ProductVersion`", `"$v`""
        Set-Content $rcPath $content -Encoding utf8

        $manifestPath = 'AudioPlaybackConnector2 (Package)/Package.appxmanifest'
        [xml]$manifest = Get-Content $manifestPath -Raw
        $manifest.Package.Identity.Version = $v
        $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
        $writer = New-Object System.IO.StreamWriter($manifestPath, $false, $utf8NoBom)
        $manifest.Save($writer)
        $writer.Close()

    - name: Decode signing certificate
      id: cert
      shell: pwsh
      run: |
        $certPath = "$env:TEMP\AudioPlaybackConnector2.pfx"
        $bytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE_PFX }}")
        [IO.File]::WriteAllBytes($certPath, $bytes)
        "CERT_PATH=$certPath" >> $env:GITHUB_OUTPUT

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: msbuild AudioPlaybackConnector2.slnx -t:restore -p:RestorePackagesConfig=true

    - name: Build signed MSIX (Release, x64)
      run: >
        msbuild AudioPlaybackConnector2.slnx
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxPackageSigningEnabled=true
        /p:PackageCertificateKeyFile=${{ steps.cert.outputs.CERT_PATH }}
        /p:PackageCertificatePassword=${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        /p:UapAppxPackageBuildMode=SideloadOnly
        /p:AppxBundle=Never
        /t:Rebuild

    - name: Locate MSIX
      id: msix
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path 'AudioPlaybackConnector2 (Package)/AppPackages' `
                              -Recurse -Filter '*.msix' |
                Where-Object { $_.Name -notmatch 'Dependencies' } |
                Select-Object -First 1
        if (-not $file) { throw "MSIX not found" }
        "PATH=$($file.FullName)" >> $env:GITHUB_OUTPUT
        "NAME=$($file.Name)"     >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ steps.version.outputs.SEMVER }}
        body: |
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.

          **Runtime dependencies:** Install these once before launching the MSIX package:

          1. [WinAppRuntime.Singleton](https://apps.microsoft.com/detail/9p5z076k079h)
          2. [Windows App SDK 2.0 runtime](https://learn.microsoft.com/en-us/windows/apps/windows-app-sdk/downloads#windows-app-sdk-20)

          If launch fails with `DEP0840` and mentions `MicrosoftCorporationII.WinAppRuntime.Main.2` or `MicrosoftCorporationII.WinAppRuntime.Singleton`, reinstall the runtime dependencies above.

          **Installation:** Download both the `.cer` and `.msix` files from the assets below.

          1. Install the runtime dependencies listed above.
          2. Install the certificate:
             ```powershell
             Import-Certificate -FilePath ".\AudioPlaybackConnector2.cer" -CertStoreLocation "Cert:\LocalMachine\Root"
             ```
          3. Install the MSIX package:
             ```powershell
             Add-AppxPackage -Path ".\${{ steps.msix.outputs.NAME }}"
             ```

          > Releases are signed with a self-signed certificate. A free open-source code-signing certificate has been requested but approval may take some time.
        files: |
          ${{ steps.msix.outputs.PATH }}
          certs/AudioPlaybackConnector2.cer
        fail_on_unmatched_files: true
